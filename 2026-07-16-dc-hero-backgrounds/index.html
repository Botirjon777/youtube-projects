<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DC Hero Backgrounds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="batman">
  <canvas id="bg"></canvas>

  <nav class="switcher" id="switcher">
    <button data-theme="batman" class="active">🦇 Batman</button>
    <button data-theme="superman">🔵 Superman</button>
    <button data-theme="flash">⚡ Flash</button>
    <button data-theme="greenlantern">💚 Green Lantern</button>
  </nav>

  <main class="hero" id="hero">
    <p class="kicker" id="kicker">move your mouse ✨</p>
    <h1 id="title">BATMAN</h1>
    <p class="sub" id="sub">Gotham rain and a bat-signal that follows you</p>
  </main>

  <footer>DC hero backgrounds · pure canvas, zero libraries 🎥</footer>
  <script src="script.js"></script>
</body>
</html>
