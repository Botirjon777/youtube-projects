<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sci-Fi Movie Backgrounds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="interstellar">
  <canvas id="bg"></canvas>

  <nav class="switcher" id="switcher">
    <button data-theme="interstellar" class="active">🕳️ Interstellar</button>
    <button data-theme="inception">🌀 Inception</button>
    <button data-theme="bladerunner">🌃 Blade Runner</button>
  </nav>

  <main class="hero" id="hero">
    <p class="kicker" id="kicker">move your mouse ✨</p>
    <h1 id="title">INTERSTELLAR</h1>
    <p class="sub" id="sub">Gargantua's accretion disk bends around your cursor</p>
  </main>

  <footer>Sci-fi movie backgrounds · pure canvas, zero libraries 🎥</footer>
  <script src="script.js"></script>
</body>
</html>
